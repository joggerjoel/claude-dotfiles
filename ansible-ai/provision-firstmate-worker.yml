---
# Provision firstmate WORKER(s) — hosts where you run persistent, attachable
# agent sessions (herdr + harnesses) reached by a crewmate over SSH. NOT nodes:
# no orchestrator toolchain, no firstmate clone. Scoped to inventory group
# `firstmate_worker_ai` (opt-in; default: aorus5, the free host).
#
#   cd ansible-ai && ansible-playbook provision-firstmate-worker.yml
#   Dry run:  ansible-playbook provision-firstmate-worker.yml --check
#   Then: ssh <worker>, run 'herdr', start a claude/pi session — attach from anywhere.
- name: Provision firstmate worker(s)
  hosts: firstmate_worker_ai
  gather_facts: true
  tasks:
    - name: Is ai-dotfiles present on the worker?
      ansible.builtin.stat:
        path: "{{ dotfiles_dir }}/setup.sh"
      register: w_dotfiles

    - name: Refresh ai-dotfiles first (pulls the latest worker script)
      ansible.builtin.shell: bash setup.sh update
      args:
        chdir: "{{ dotfiles_dir }}"
        executable: /bin/bash
      register: w_refresh
      changed_when: "'pull-status: updated' in w_refresh.stdout"
      failed_when: false
      when: w_dotfiles.stat.exists

    - name: Is the worker script present after refresh?
      ansible.builtin.stat:
        path: "{{ dotfiles_dir }}/scripts/provision-firstmate-worker.sh"
      register: w_script
      when: w_dotfiles.stat.exists

    - name: Provision the worker (herdr + harnesses)
      ansible.builtin.command: bash scripts/provision-firstmate-worker.sh
      args:
        chdir: "{{ dotfiles_dir }}"
      environment:
        AGENTS_AUTO_INSTALL: "1"
      register: w_provision
      changed_when: "'installed' in w_provision.stdout"
      failed_when: w_provision.rc != 0
      when: w_dotfiles.stat.exists and (w_script.stat.exists | default(false))

    - name: Report worker result
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ->
          {{ 'firstmate worker ready' if (w_provision.rc | default(1)) == 0
             else 'NOT ready — ' ~ (w_provision.stdout_lines[-2:] | default(['(no output)']) | join(' | ')) }}
      when: w_provision is not skipped

    - name: Warn if ai-dotfiles is absent
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} -> ai-dotfiles not installed; run provision-ai.yml first"
      when: not w_dotfiles.stat.exists
