---
# Makes the `<host>-claude` SSH aliases fully functional on every aorus box.
#
# Stage A — runtime (so the alias's RemoteCommand works at all):
#   - ~/Documents/Projects exists
#   - tmux installed (session persistence)
#   - Claude Code BINARY at ~/.local/bin/claude (native installer)
#
# Stage B — config (so remote claude behaves like your local setup):
#   - base deps (git/jq/curl) so setup.sh needn't sudo mid-run
#   - clone joggerjoel/ai-dotfiles
#   - run setup.sh UNATTENDED with the vps profile + core plugin stack
#     (answers seeded: profile=2/vps, github user, hide-AI=y; EOF drives the
#      rest to safe defaults: skip MCP integrations, skip Supabase, install
#      core plugins, skip optional plugin groups)
#
# Idempotent: re-running skips anything already in place.
# Offline hosts (aorus2/aorus3 when down) are reported unreachable and skipped.
- name: Provision aorus hosts for the *-claude SSH aliases
  hosts: aorus_ai
  gather_facts: true
  ignore_unreachable: true
  vars:
    # Retry transient network/CDN errors (5xx, 429, timeouts, conn refused) so a
    # blip like a 503 from an install CDN doesn't hard-fail a whole host.
    curl_retry: "--retry 5 --retry-delay 2 --retry-connrefused"
  tasks:
    # ── Stage 0: prerequisites ───────────────────────────────────────
    # Every CLI installer below pipes `curl`, and setup.sh needs git/jq. Install
    # (or confirm) these FIRST, then fail the host fast with a clear message so we
    # never attempt a doomed curl-based install on a box that lacks curl.
    # apt + sudo only apply to the Debian/Ubuntu fleet. macOS hosts get these
    # from Homebrew already; the gate task below verifies they're present.
    - name: Install prerequisite packages (curl, git, jq, unzip, ca-certificates)
      become: true
      ansible.builtin.package:
        name: [curl, git, jq, unzip, ca-certificates, tar, gzip]
        state: present
      failed_when: false # a pkg-mgr hiccup shouldn't abort; the gate below decides
      register: prereqs
      when: ansible_os_family == "Debian"

    - name: Check the hard prerequisites are present
      ansible.builtin.shell: "command -v curl >/dev/null && command -v git >/dev/null"
      args:
        executable: /bin/bash
      register: prereq_check
      changed_when: false
      failed_when: false

    - name: Fail fast when prerequisites are missing
      ansible.builtin.fail:
        msg: >-
          Missing required tools on {{ inventory_hostname }} (need curl and git).
          Package install did not provide them — check the host's package manager
          and sudo access, then re-run. Skipping all installs for this host.
      when: prereq_check.rc != 0

    # Node.js runtime for Gemini CLI (npm-only, needs node >=20). Not an OS
    # package, so bootstrap nvm + Node LTS here — as part of the deploy — when no
    # runtime is present. Idempotent: skipped when node already resolves.
    - name: Is a Node.js runtime available (system or nvm)?
      ansible.builtin.shell: |
        command -v node >/dev/null 2>&1 && exit 0
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        command -v node >/dev/null 2>&1
      args:
        executable: /bin/bash
      register: node_check
      changed_when: false
      failed_when: false

    - name: Install nvm (when no Node.js runtime present)
      ansible.builtin.shell: |
        set -o pipefail
        curl {{ curl_retry }} -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.5/install.sh | bash
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
      when: node_check.rc != 0

    - name: Install Node.js LTS via nvm (when no Node.js runtime present)
      ansible.builtin.shell: |
        set -o pipefail
        export NVM_DIR="$HOME/.nvm"
        . "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm alias default 'lts/*'
      args:
        executable: /bin/bash
      when: node_check.rc != 0

    # ── Stage A: runtime ─────────────────────────────────────────────
    - name: Detect existing tmux
      ansible.builtin.shell: command -v tmux
      register: tmux_check
      changed_when: false
      failed_when: false

    - name: Install tmux (only when missing; requires sudo)
      become: true
      ansible.builtin.package:
        name: tmux
        state: present
      when: tmux_check.rc != 0 and ansible_os_family == "Debian"

    - name: Ensure ~/Documents/Projects exists
      ansible.builtin.file:
        path: "{{ projects_dir }}"
        state: directory
        mode: "0755"

    - name: Check for the Claude Code binary
      ansible.builtin.stat:
        path: "{{ claude_bin }}"
      register: claude_stat

    - name: Install Claude Code binary (native installer -> ~/.local/bin)
      ansible.builtin.shell: |
        set -o pipefail
        curl {{ curl_retry }} -fsSL https://claude.ai/install.sh | bash
      args:
        executable: /bin/bash
        creates: "{{ claude_bin }}"
      when: not claude_stat.stat.exists

    # ── Sibling agent CLIs (share ~/.claude/CLAUDE.md via AGENTS.md symlink,
    #    which setup.sh creates in Stage B) ────────────────────────────
    - name: Install Codex CLI (standalone installer -> ~/.local/bin/codex)
      ansible.builtin.shell: |
        set -o pipefail
        curl {{ curl_retry }} -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.local/bin/codex"

    - name: Install Cursor CLI (official installer -> ~/.local/bin/cursor-agent)
      ansible.builtin.shell: |
        set -o pipefail
        curl {{ curl_retry }} -fsSL https://cursor.com/install | bash
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.local/bin/cursor-agent"

    - name: Install Cortex Code CLI (Snowflake installer -> ~/.local/bin/cortex)
      ansible.builtin.shell: |
        set -o pipefail
        curl {{ curl_retry }} -fsSL https://ai.snowflake.com/static/cc-scripts/install.sh | NON_INTERACTIVE=1 SKIP_PATH_PROMPT=1 sh
      args:
        executable: /bin/bash
        creates: "{{ ansible_env.HOME }}/.local/bin/cortex"

    - name: Is opencode present? (installer dir varies)
      ansible.builtin.shell: |
        for p in "$HOME/.opencode/bin/opencode" "$HOME/.local/bin/opencode"; do
          [ -x "$p" ] && exit 0
        done
        command -v opencode >/dev/null 2>&1
      args:
        executable: /bin/bash
      register: opencode_check
      changed_when: false
      failed_when: false

    - name: Install opencode (standalone installer)
      ansible.builtin.shell: |
        set -o pipefail
        curl {{ curl_retry }} -fsSL https://opencode.ai/install | bash
      args:
        executable: /bin/bash
      when: opencode_check.rc != 0

    - name: Is the Gemini CLI present? (npm global lives under nvm)
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        command -v gemini
      args:
        executable: /bin/bash
      register: gemini_check
      changed_when: false
      failed_when: false

    - name: Install Gemini CLI (npm global, via nvm)
      ansible.builtin.shell: |
        set -o pipefail
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        npm install -g @google/gemini-cli
      args:
        executable: /bin/bash
      when: gemini_check.rc != 0

    # ── Stage B: ai-dotfiles config (vps profile) ────────────────
    # (git/jq/curl already ensured in Stage 0)
    # force: true discards local runtime pollution — the live ~/.claude/settings.json
    # symlinks into profiles/*/settings.json, so Claude writing enabledPlugins there
    # dirties this tree. The fleet checkout is a deploy mirror of origin, so reset it.
    - name: Clone/update ai-dotfiles
      ansible.builtin.git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dir }}"
        version: main
        update: true
        force: true
      when: install_dotfiles | bool

    - name: Has ai-dotfiles already been set up on this host?
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.claude/settings.json"
      register: dotfiles_done
      when: install_dotfiles | bool

    - name: Run ai-dotfiles setup.sh (vps profile, unattended)
      ansible.builtin.shell: |
        printf '2\n{{ dotfiles_github_user }}\n{{ dotfiles_hide_ai }}\n' | bash setup.sh
      args:
        chdir: "{{ dotfiles_dir }}"
        executable: /bin/bash
      register: dotfiles_setup
      changed_when: "'Setup complete' in dotfiles_setup.stdout"
      when:
        - install_dotfiles | bool
        - not (dotfiles_done.stat.exists | default(false))

    # ── Verify + report ──────────────────────────────────────────────
    - name: Verify claude
      ansible.builtin.command: "{{ claude_bin }} --version"
      register: claude_ver
      changed_when: false
      failed_when: false

    - name: Verify sibling agent CLIs
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        oc=MISSING
        for p in "$HOME/.opencode/bin/opencode" "$HOME/.local/bin/opencode"; do
          [ -x "$p" ] && { oc=present; break; }
        done
        printf 'codex=%s cursor=%s cortex=%s opencode=%s gemini=%s' \
          "$([ -x "$HOME/.local/bin/codex" ] && echo present || echo MISSING)" \
          "$([ -x "$HOME/.local/bin/cursor-agent" ] && echo present || echo MISSING)" \
          "$([ -x "$HOME/.local/bin/cortex" ] && echo present || echo MISSING)" \
          "$oc" \
          "$(command -v gemini >/dev/null 2>&1 && echo present || echo MISSING)"
      args:
        executable: /bin/bash
      register: sibling_clis
      changed_when: false
      failed_when: false

    - name: Report per-host result
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ->
          tmux: {{ 'present' if tmux_check.rc == 0 else ('installed' if ansible_os_family == 'Debian' else 'MISSING (non-Debian — install manually)') }} |
          claude: {{ claude_ver.stdout | default('MISSING', true) }} |
          {{ sibling_clis.stdout | default('codex=? cursor=?', true) }} |
          dotfiles: {{ 'configured' if (install_dotfiles | bool) else 'skipped' }}
