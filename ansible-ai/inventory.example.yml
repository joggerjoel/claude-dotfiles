# Example inventory — copy to inventory.local.yml and fill in your hosts.
# inventory.local.yml is gitignored: real IPs, jump hosts, and usernames
# never belong in the tracked repo (this repo is public).
#
#   cp inventory.example.yml inventory.local.yml
#
# The IPs below are documentation placeholders (RFC 5737 TEST-NET).
aorus_ai:
  hosts:
    server1: { ansible_host: 192.0.2.10 }
    server2: { ansible_host: 192.0.2.11 }
  vars:
    ansible_user: youruser
    # ProxyJump is optional — drop the line if you reach hosts directly.
    ansible_ssh_common_args: >-
      -o ProxyJump=203.0.113.1
      -o ConnectTimeout=15
      -o StrictHostKeyChecking=accept-new
    # Consumed by the playbooks:
    claude_bin: "{{ ansible_env.HOME }}/.local/bin/claude"
    projects_dir: "{{ ansible_env.HOME }}/Documents/Projects"
    # ai-dotfiles (config layer) — vps profile, unattended:
    install_dotfiles: true
    dotfiles_repo: "https://github.com/joggerjoel/ai-dotfiles.git"
    dotfiles_dir: "{{ ansible_env.HOME }}/ai-dotfiles"
    dotfiles_github_user: "youruser"
    dotfiles_hide_ai: "y"

# ── 9router gateway host(s) — deploy-9router.yml targets ONLY this ─
# A subset of aorus_ai (list the host in both groups so it inherits the
# connection vars above). Membership here means "runs the 9router Docker
# stack" — update.yml imports deploy-9router.yml, so putting the whole
# fleet here would install the gateway on every host each update run.
ninerouter_ai:
  hosts:
    server1:

# ── Native headroom proxy host(s) — deploy-headroom-proxy.yml targets ─
# Hosts that run `headroom proxy` straight from the CLI install, supervised
# as a systemd user unit (Linux only). ninerouter_ai hosts get their proxy
# as a Docker container instead — put a host in ONE of the two groups.
# Also a subset of aorus_ai (list the host in both groups for the
# connection vars).
headroom_native_ai:
  hosts:
    server2:

# ── Local control node (the machine you run ansible from) ────────
# `ansible_connection: local` runs tasks here directly — no SSH.
local_ai:
  hosts:
    localhost:
      ansible_connection: local
  vars:
    claude_bin: "{{ ansible_env.HOME }}/.local/bin/claude"
    # Set to YOUR local checkout of this repo — it's often somewhere like
    # ~/Developer/Git/ai-dotfiles, not the fleet's ~/ai-dotfiles. If this is
    # wrong, update.yml silently reports "dotfiles: not installed" for
    # localhost on every run.
    dotfiles_dir: "{{ ansible_env.HOME }}/ai-dotfiles"

# ── The everyday update target: fleet + control node ─────────────
ai_all:
  children:
    aorus_ai:
    local_ai:
