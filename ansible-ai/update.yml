---
# Fleet update, driven from the MacBook Pro (control node).
# For every reachable aorus host:
#   1. Upgrade the Claude Code binary   (native `claude update`)
#   2. Refresh ai-dotfiles config   (`setup.sh update`: git pull --rebase
#      --autostash, then re-apply the SAVED vps profile — fully unattended)
#   3. Upgrade the sibling agent CLIs   (scripts/agents-update.sh from the
#      freshly-pulled repo: codex, cursor-agent, cortex, opencode, gemini,
#      headroom — plus a 9router gateway status line)
#   4. Update the 9router gateway   (imports deploy-9router.yml — aorus
#      hosts only; recreates containers only when the image changed.
#      Skip with --skip-tags 9router)
#   5. Refresh the native headroom proxy   (imports deploy-headroom-proxy.yml
#      — headroom_native_ai hosts only; restarts the systemd user unit when
#      the running proxy lags the upgraded CLI. Skip with --skip-tags headroom)
#
# Workflow: push changes to github.com/joggerjoel/ai-dotfiles, then run this
# to propagate them to the whole fleet.
#
# Read-only-safe to dry-run with --check. Offline hosts are skipped.
#
# Targets `ai_all` = the aorus servers + this Mac (the local control node, via
# ansible_connection: local). One run refreshes the whole picture. Limit with
# `--limit aorus_ai` (servers only) or `--limit local_ai` (this Mac only).
- name: Update the claude fleet (servers + local control node)
  hosts: ai_all
  gather_facts: true
  ignore_unreachable: true
  tasks:
    - name: Is the claude binary present?
      ansible.builtin.stat:
        path: "{{ claude_bin }}"
      register: claude_stat

    - name: Record current claude version
      ansible.builtin.command: "{{ claude_bin }} --version"
      register: ver_before
      changed_when: false
      failed_when: false
      when: claude_stat.stat.exists

    - name: Upgrade the Claude Code binary
      ansible.builtin.command: "{{ claude_bin }} update"
      register: bin_update
      changed_when: "'latest' not in (bin_update.stdout | lower)"
      failed_when: false
      when: claude_stat.stat.exists

    - name: Is ai-dotfiles present?
      ansible.builtin.stat:
        path: "{{ dotfiles_dir }}/setup.sh"
      register: dotfiles_stat

    - name: Refresh ai-dotfiles config (git pull + re-apply saved profile)
      ansible.builtin.shell: bash setup.sh update
      args:
        chdir: "{{ dotfiles_dir }}"
        executable: /bin/bash
      register: dotfiles_update
      # setup.sh prints "pull-status: updated" only when HEAD actually moved,
      # and exits non-zero with a PULL-FAILED sentinel when the sync fails —
      # so a wedged host colors the recap red instead of claiming "refreshed".
      changed_when: "'pull-status: updated' in dotfiles_update.stdout"
      when: dotfiles_stat.stat.exists

    # Runs AFTER the repo refresh so the freshly-pulled script is used.
    # scripts/agents-update.sh is the single source of truth for the CLI
    # list — ./update.sh runs the same script locally.
    - name: Upgrade the sibling agent CLIs (codex, cursor, cortex, opencode, gemini, headroom; reports 9router)
      ansible.builtin.command: bash scripts/agents-update.sh
      args:
        chdir: "{{ dotfiles_dir }}"
      environment:
        # Install missing CLIs unattended so the fleet roster converges —
        # otherwise hosts provisioned before a CLI was added never get it.
        AGENTS_AUTO_INSTALL: "1"
      register: agents_update
      changed_when: false
      failed_when: false
      when: dotfiles_stat.stat.exists

    - name: Record new claude version
      ansible.builtin.command: "{{ claude_bin }} --version"
      register: ver_after
      changed_when: false
      failed_when: false
      when: claude_stat.stat.exists

    - name: Report per-host result
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ->
          claude: {{ ver_before.stdout | default('n/a', true) }}
          -> {{ ver_after.stdout | default('n/a', true) }} |
          dotfiles: {{ 'refreshed' if dotfiles_stat.stat.exists else 'not installed' }}

    # Always reports — an empty stdout with rc=127 (script missing after a
    # failed pull) used to vanish entirely from the recap.
    - name: Report sibling agent CLI results
      ansible.builtin.debug:
        msg: >-
          {{ agents_update.stdout_lines[1:] | map('trim') | list
             if (agents_update.stdout_lines | default([]) | length > 1)
             else ['agents-update.sh produced no report — rc=' ~ (agents_update.rc | default('n/a'))
                   ~ ' err: ' ~ (agents_update.stderr | default('') | trim | truncate(120))] }}
      when: agents_update is not skipped

# ── 4. 9router gateway (Docker on the aorus hosts) ───────────────
# deploy-9router.yml doubles as the update path: it re-pulls :latest and
# `docker compose up -d` recreates the containers ONLY when the image
# actually changed — a no-update run never restarts a gateway other CLIs
# may be streaming through. Secrets are preserved across re-runs.
# Skip entirely with:  ansible-playbook update.yml --skip-tags 9router
- import_playbook: deploy-9router.yml
  tags: [9router]

# ── 5. Native headroom proxy (systemd user unit, headroom_native_ai hosts) ──
# agents-update.sh upgrades the headroom CLI but never restarts a live proxy;
# this play restarts the unit only when /health shows the proxy lagging the
# CLI. Skip with:  ansible-playbook update.yml --skip-tags headroom
- import_playbook: deploy-headroom-proxy.yml
  tags: [headroom]
